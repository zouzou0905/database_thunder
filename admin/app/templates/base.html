<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}管理系统{% endblock %} — 关键词选品工作台</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <strong>⚡ 管理面板</strong>
        <span>Keyword Trends</span>
      </div>
      <nav>
        <a href="/admin/" class="{% if request.url.path == '/admin/' %}active{% endif %}">📊 仪表盘</a>
        <a href="/admin/users" class="{% if request.url.path.startswith('/admin/users') %}active{% endif %}">👥 用户管理</a>
        <a href="/admin/error-logs" class="{% if request.url.path.startswith('/admin/error-logs') %}active{% endif %}">🐛 错误日志</a>
      </nav>
      <div class="sidebar-footer">
        <span>{{ admin.account }} ({{ admin.role }})</span>
        <a href="/admin/logout">退出</a>
      </div>
    </aside>
    <main class="content">
      {% if error %}
      <div class="flash flash-error">{{ error }}</div>
      {% endif %}
      {% if notice %}
      <div class="flash flash-success">{{ notice }}</div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="/static/admin.js"></script>
</body>
</html>
